version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: llm-api
    environment:
      - MODEL_ID=TinyLlama/TinyLlama-1.1B-Chat-v1.0
      - PYTHONUNBUFFERED=1
      - PYTHONIOENCODING=utf-8
      - PYTHONUTF8=1
      # Optional routing controls
      # - FORCE_TIER=quality
    ports:
      - "8000:8000"
    volumes:
      - ./results:/app/results
      - ./models:/app/models
      - ./mlruns:/app/mlruns
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  mlflow:
    image: python:3.11-slim
    container_name: llm-mlflow
    working_dir: /srv
    command: >
      sh -c "pip install --no-cache-dir mlflow==2.12.1 &&
             mlflow server
               --backend-store-uri file:///srv/mlruns
               --default-artifact-root file:///srv/mlruns
               --host 0.0.0.0
               --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/srv/mlruns
    restart: unless-stopped

  dashboard:
    image: node:18-alpine
    container_name: llm-dashboard
    working_dir: /app
    command: sh -c "npm ci && npm run build && npm run preview -- --host 0.0.0.0 --port 5173"
    ports:
      - "5173:5173"
    volumes:
      - ./dashboard:/app
    environment:
      - NODE_ENV=production
    restart: unless-stopped

networks:
  default:
    name: llm-net
    driver: bridge

